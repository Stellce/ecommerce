spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:shop}
    username: ${POSTGRES_USER:shop}
    password: ${POSTGRES_PASSWORD:shop}
  flyway:
    locations: "classpath:db/migration"
    baseline-on-migrate: true
    fail-on-missing-locations: true
app:
  bootstrap-admin:
    email: ${BOOTSTRAP_ADMIN_EMAIL}
    password: ${BOOTSTRAP_ADMIN_PASSWORD}
jwt:
  secret: ${JWT_SECRET}
  access_expiration: ${JWT_ACCESS_EXPIRATION}
  refresh_expiration: ${JWT_REFRESH_EXPIRATION}
